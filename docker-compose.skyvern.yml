services:
  skyvern-postgres:
    image: postgres:14-alpine
    restart: always
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_USER=skyvern
      - POSTGRES_PASSWORD=skyvern
      - POSTGRES_DB=skyvern
    volumes:
      - ./skyvern-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyvern"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  skyvern:
    build:
      context: ./skyvern-fork
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8080:8000"
      - "6080:6080"
    env_file:
      - .env.local
    environment:
      - DATABASE_STRING=postgresql+psycopg://skyvern:skyvern@skyvern-postgres:5432/skyvern
      - BROWSER_TYPE=chromium-headful
      - BROWSER_WIDTH=1920
      - BROWSER_HEIGHT=1080
      - ENABLE_GROQ=false
      - ENABLE_OPENAI_COMPATIBLE=true
      - LLM_KEY=OPENAI_COMPATIBLE
      - OPENAI_COMPATIBLE_MODEL_NAME=gemini-3.1-flash-lite-preview
      - OPENAI_COMPATIBLE_API_BASE=https://generativelanguage.googleapis.com/v1beta/openai/
      - OPENAI_COMPATIBLE_SUPPORTS_VISION=true
      - ENABLE_CODE_BLOCK=true
      - VIDEO_PATH=/data/videos
      - ARTIFACT_STORAGE_PATH=/data/artifacts
      # ── Fix for WebGL-heavy sites in Docker (no GPU) ──
      # Use SwiftShader via ANGLE for stable software WebGL rendering
      - BROWSER_ADDITIONAL_ARGS=["--use-gl=angle","--use-angle=swiftshader-webgl","--disable-dev-shm-usage","--disable-gpu-sandbox"]
      # Allow retries when scraping fails (default is 0 = instant failure)
      - MAX_SCRAPING_RETRIES=2
      # More time for GPU-stalled pages to load (default 60s)
      - BROWSER_LOADING_TIMEOUT_MS=120000
      # More time for screenshots on software-rendered pages (default 20s)
      - BROWSER_SCREENSHOT_TIMEOUT_MS=60000
      # Keep screenshot payload minimal on large SPA pages.
      - MAX_NUM_SCREENSHOTS=1
      # Keep retries bounded to avoid long thrash loops per step.
      - MAX_RETRIES_PER_STEP=8
      # Keep each task shorter/more stable for heavy React pages.
      - MAX_STEPS_PER_RUN=25
    volumes:
      - ./skyvern-data/videos:/data/videos
      - ./skyvern-data/artifacts:/data/artifacts
      - ./skyvern-data/har:/data/har
      - ./skyvern-data/log:/data/log
      - ./skyvern-fork/skyvern/webeye/teaser_hooks.py:/app/skyvern/webeye/teaser_hooks.py
    depends_on:
      skyvern-postgres:
        condition: service_healthy
